# Server Configuration
server.port=${PORT:8080}
spring.application.name=financial-health-dashboard

# Database Configuration
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/finance_db?useSSL=false&serverTimezone=UTC&createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:hasanali7623}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration
jwt.secret=${JWT_SECRET:yourSuperSecretJWTKeyThatIsAtLeast256BitsLongForHS256Algorithm}
jwt.expiration=86400000
jwt.refresh.expiration=604800000

# External API Keys
ocr.space.api.key=${OCR_SPACE_API_KEY:your_ocr_space_api_key}
gemini.api.key=${GEMINI_API_KEY:your_gemini_api_key}
frankfurter.base.url=${FRANKFURTER_BASE_URL:https://api.frankfurter.app}

# CORS Configuration
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173,http://localhost:4200,http://localhost:8080}

# Email Configuration (Optional)
mailgun.api.key=${MAILGUN_API_KEY:optional}
mailgun.domain=${MAILGUN_DOMAIN:optional}

# File Upload Configuration
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Logging Configuration
logging.level.com.finance=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG

# Swagger/OpenAPI Configuration
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
